<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        input, select, button { padding: 10px; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .view-tabs, .chart-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .view-tab, .chart-tab { background-color: #e9ecef; color: #222; border: 1px solid #ccc; }
        .view-tab.active, .chart-tab.active { background-color: #007bff; color: white; border-color: #007bff; }
        .chart-view[hidden], .analysis-view[hidden], .next-view[hidden] { display: none; }
        .chart-range { margin-bottom: 20px; }
        .chart-range select { width: 100%; }
        .chart-grid { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .chart-panel { border: 1px solid #ccc; padding: 12px; }
        .chart-panel h3 { font-size: 16px; margin: 0 0 10px; }
        .chart-canvas-wrap { height: 240px; position: relative; }
        .chart-canvas-wrap canvas { display: block; }
        .analysis-table-wrap { overflow-x: auto; margin-bottom: 30px; }
        .analysis-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .analysis-table th, .analysis-table td { border: 1px solid #ccc; padding: 10px; text-align: right; }
        .analysis-table th:first-child, .analysis-table td:first-child { text-align: left; }
        .analysis-table th { background: #f8f9fa; }
        .analysis-table tfoot td { font-weight: bold; background: #f8f9fa; }
        .analysis-note { color: #555; font-size: 13px; margin-top: -14px; margin-bottom: 20px; }
        .next-table-wrap { overflow-x: auto; margin-bottom: 30px; }
        .next-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .next-table th, .next-table td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .next-table th { background: #f8f9fa; }
        details { margin-bottom: 30px; }
        summary { cursor: pointer; font-size: 1.5em; font-weight: bold; margin: 0.83em 0; }
        .log-item { padding: 10px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>

    <h2>Log Workout</h2>
    <form id="workoutForm">
        <select id="exercise" required>
            <option value="" disabled selected>Select exercise</option>
            <option value="Bath dips">Bath dips</option>
            <option value="Barbell Row">Barbell Row</option>
            <option value="Bench Press">Bench Press</option>
            <option value="Bicep Curl">Bicep Curl</option>
            <option value="Cable Face Pulls">Cable Face Pulls</option>
            <option value="Calf Raises, single">Calf Raises, single</option>
            <option value="Calf Extension">Calf Extension</option>
	    <option value="Chest Fly Bench">Chest Fly Bench</option>
            <option value="Chin ups">Chin ups</option>
            <option value="Deadlift">Deadlift</option>
            <option value="Double Dumbbell Row">Double Dumbbell Row</option>
            <option value="Dumbbell PUllover">Dumbbell PUllover</option>
            <option value="Dumbbell Upright Row">Dumbbell Upright Row</option>
            <option value="High Row">High Row</option>
            <option value="Lat Pull-down">Lat Pull-down</option>
            <option value="Leg Curl">Leg Curl</option>
            <option value="Leg extension">Leg extension</option>
            <option value="Low horizontal Row">Low horizontal Row</option>
            <option value="Military Press">Military Press</option>
            <option value="Overhead tricep extention">Overhead tricep extention</option>
            <option value="Reverse Dumbbell Fly">Reverse Dumbbell Fly</option>
            <option value="Pull ups">Pull ups</option>
            <option value="Push ups">Push ups</option>
            <option value="Push ups">Push ups</option>
	    <option value="Seated Hip Abduction">Seated Hip Abduction</option>
	    <option value="Seated Hip Adduction">Seated Hip Adduction</option>
            <option value="Shoulder Hammer Press">Shoulder Hammer Press</option>
            <option value="Shoulder Press">Shoulder Press</option>
            <option value="Side Laterals">Side Laterals</option>
            <option value="Squat">Squat</option>
	    <option value="Tricep Pull-down">Tricep Pull-down</option>
        </select>
        <input type="number" id="weight" placeholder="Weight (lbs/kg)" required step="any">
        <input type="number" id="reps" placeholder="Reps" required>
        <button type="submit">Save Entry</button>
    </form>

    <div id="viewTabs" class="view-tabs" aria-label="Workout views">
        <button type="button" class="view-tab active" data-view="charts">Charts</button>
        <button type="button" class="view-tab" data-view="analysis">Analysis</button>
        <button type="button" class="view-tab" data-view="next">Next</button>
    </div>

    <section id="chartsView" class="chart-view">
        <h2>Charts</h2>
        <div class="chart-range">
            <select id="chartRange" aria-label="Chart time range">
                <option value="2w" selected>2 weeks</option>
                <option value="1m">1 month</option>
                <option value="2m">2 months</option>
                <option value="3m">3 months</option>
                <option value="4m">4 months</option>
                <option value="6m">6 months</option>
                <option value="9m">9 months</option>
                <option value="1y">1 year</option>
                <option value="2y">2 years</option>
                <option value="3y">3 years</option>
                <option value="4y">4 years</option>
                <option value="5y">5 years</option>
                <option value="6y">6 years</option>
            </select>
        </div>
        <div id="chartTabs" class="chart-tabs">
            <button type="button" class="chart-tab active" data-category="Chest">Chest</button>
            <button type="button" class="chart-tab" data-category="Arms">Arms</button>
            <button type="button" class="chart-tab" data-category="Back">Back</button>
            <button type="button" class="chart-tab" data-category="Shoulder">Shoulder</button>
            <button type="button" class="chart-tab" data-category="Legs">Legs</button>
        </div>
        <div id="chartGrid" class="chart-grid">Loading charts...</div>
    </section>

    <section id="analysisView" class="analysis-view" hidden>
        <h2>Analysis</h2>
        <div id="analysisTable" class="analysis-table-wrap">Loading analysis...</div>
        <p class="analysis-note">Weighted exercises trend reps within each period, then convert the change to estimated lifting capacity with the Epley formula. Bodyweight entries use reps as the strength score.</p>
    </section>

    <section id="nextView" class="next-view" hidden>
        <h2>Next</h2>
        <div id="nextTable" class="next-table-wrap">Loading next exercises...</div>
    </section>

    <details id="historyDetails">
        <summary>History</summary>
	<div class="version">1.0.0</div>
        <div id="historyLog"></div>
    </details>

    <!-- Firebase SDK Modules -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // Firebase web app configuration. These values are safe to include in a static GitHub Pages site.
        const firebaseConfig = {
            apiKey: "AIzaSyApCs8oH1lgpvweICAu3MNr6QwzTC1iVq8",
            authDomain: "workouts-246c5.firebaseapp.com",
            databaseURL: "https://workouts-246c5-default-rtdb.firebaseio.com",
            projectId: "workouts-246c5",
            storageBucket: "workouts-246c5.firebasestorage.app",
            messagingSenderId: "238007804712",
            appId: "1:238007804712:web:d4ee8df8b38103a634661d",
            measurementId: "G-1F034HFJCX"
        };

        const form = document.getElementById("workoutForm");
        const viewTabs = document.getElementById("viewTabs");
        const chartsView = document.getElementById("chartsView");
        const analysisView = document.getElementById("analysisView");
        const nextView = document.getElementById("nextView");
        const chartTabs = document.getElementById("chartTabs");
        const chartRange = document.getElementById("chartRange");
        const chartGrid = document.getElementById("chartGrid");
        const analysisTable = document.getElementById("analysisTable");
        const nextTable = document.getElementById("nextTable");
        const historyDetails = document.getElementById("historyDetails");
        const historyLog = document.getElementById("historyLog");
        const chartsByKey = new Map();
        let latestEntries = [];
        let activeView = "charts";
        let activeChartCategory = "Chest";

        const hasFirebaseConfig = Object.values(firebaseConfig).every((value) => !value.startsWith("YOUR_"));

        if (!hasFirebaseConfig) {
            historyLog.innerHTML = "<p>Add your Firebase web app config to index.html to enable cloud sync.</p>";
            form.querySelector("button").disabled = true;
            throw new Error("Missing Firebase web app config.");
        }

        // Initialize Firebase and Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const workoutCollection = collection(db, "workouts");

        const exerciseCategories = {
            "Bath dips": "Arms",
	    "Barbell Row": "Back",
	    "Lat Pull-down": "Back",
	    "Chest Fly Bench": "Chest",
	    "Reverse Dumbbell Fly": "Back",
	    "High Row": "Back",
	    "Tricep Pull-down": "Arms",
            "Bench Press": "Chest",
            "Dumbbell PUllover": "Chest",
            "Bicep Curl": "Arms",
            "Overhead tricep extention": "Arms",
            "Low horizontal Row": "Back",
            "Double Dumbbell Row": "Back",
            "Pull ups": "Back",
            "Chin ups": "Back",
            "Push ups": "Chest",
            "Shoulder Press": "Shoulder",
            "Military Press": "Shoulder",
            "Shoulder Hammer Press": "Shoulder",
            "Side Laterals": "Shoulder",
            "Dumbbell Upright Row": "Shoulder",
            "Cable Face Pulls": "Shoulder",
            "Squat": "Legs",
	    "Seated Hip Abduction": "Legs",
	    "Seated Hip Adduction": "Legs",
            "Deadlift": "Legs",
            "Calf Raises, single": "Legs",
            "Calf Extension": "Legs",
            "Leg extension": "Legs",
            "Leg Curl": "Legs"
        };

        const bodyweightExercises = new Set(["Bath dips", "Chin ups", "Pull ups", "Push ups", "Calf Raises, single"]);

        function getExerciseLabel(exercise) {
            if (exercise === "Squats") return "Squat";
            if (exercise === "deadlift") return "Deadlift";
            if (exercise === "Double dumbbell rows") return "Double Dumbbell Row";
            if (exercise === "Max pull ups") return "Pull ups";
            return exercise;
        }

        function getDateLabel(timestamp) {
            return new Date(timestamp * 1000).toLocaleDateString(undefined, {
                month: "short",
                day: "numeric"
            });
        }

        function getChartRange() {
            const endDate = new Date();
            const startDate = new Date(endDate);
            const selectedRange = chartRange.value;

            if (selectedRange === "2w") startDate.setDate(startDate.getDate() - 14);
            if (selectedRange === "1m") startDate.setMonth(startDate.getMonth() - 1);
            if (selectedRange === "2m") startDate.setMonth(startDate.getMonth() - 2);
            if (selectedRange === "3m") startDate.setMonth(startDate.getMonth() - 3);
            if (selectedRange === "4m") startDate.setMonth(startDate.getMonth() - 4);
            if (selectedRange === "6m") startDate.setMonth(startDate.getMonth() - 6);
            if (selectedRange === "9m") startDate.setMonth(startDate.getMonth() - 9);
            if (selectedRange === "1y") startDate.setFullYear(startDate.getFullYear() - 1);
            if (selectedRange === "2y") startDate.setFullYear(startDate.getFullYear() - 2);
            if (selectedRange === "3y") startDate.setFullYear(startDate.getFullYear() - 3);
            if (selectedRange === "4y") startDate.setFullYear(startDate.getFullYear() - 4);
            if (selectedRange === "5y") startDate.setFullYear(startDate.getFullYear() - 5);
            if (selectedRange === "6y") startDate.setFullYear(startDate.getFullYear() - 6);

            return {
                start: Math.floor(startDate.getTime() / 1000),
                end: Math.floor(endDate.getTime() / 1000)
            };
        }

        function getLineColor(index) {
            const colors = ["#007bff", "#dc3545", "#28a745", "#fd7e14", "#6f42c1", "#20c997"];
            return colors[index % colors.length];
        }

        function getRepPrediction(points, timestamp) {
            if (points.length < 2) return null;

            const firstTimestamp = points[0].timestamp;
            const normalizedPoints = points.map((point) => ({
                x: (point.timestamp - firstTimestamp) / (24 * 60 * 60),
                y: point.reps
            }));
            const targetX = (timestamp - firstTimestamp) / (24 * 60 * 60);
            const count = normalizedPoints.length;
            const sumX = normalizedPoints.reduce((total, point) => total + point.x, 0);
            const sumY = normalizedPoints.reduce((total, point) => total + point.y, 0);
            const sumXY = normalizedPoints.reduce((total, point) => total + (point.x * point.y), 0);
            const sumX2 = normalizedPoints.reduce((total, point) => total + (point.x * point.x), 0);
            const denominator = (count * sumX2) - (sumX * sumX);

            if (denominator === 0) return null;

            const slope = ((count * sumXY) - (sumX * sumY)) / denominator;
            const intercept = (sumY - (slope * sumX)) / count;
            return intercept + (slope * targetX);
        }

        function getEstimatedOneRepMax(weight, reps) {
            return weight * (1 + (reps / 30));
        }

        function getEquivalentWeightForReps(oneRepMax, reps) {
            return oneRepMax / (1 + (reps / 30));
        }

        function getTrendPercent(points, days) {
            const now = Math.floor(Date.now() / 1000);
            const periodStart = now - (days * 24 * 60 * 60);
            const periodPoints = points
                .filter((point) => point.timestamp >= periodStart && point.timestamp <= now)
                .sort((a, b) => a.timestamp - b.timestamp);

            if (periodPoints.length < 2) return null;

            const firstTimestamp = periodPoints[0].timestamp;
            const lastTimestamp = periodPoints[periodPoints.length - 1].timestamp;
            const previousReps = getRepPrediction(periodPoints, firstTimestamp);
            const currentReps = getRepPrediction(periodPoints, lastTimestamp);
            const weight = Number(periodPoints[0]?.weight);

            if (previousReps === null || currentReps === null || previousReps <= 0 || currentReps <= 0) {
                return null;
            }

            if (weight <= 0) {
                return ((currentReps - previousReps) / previousReps) * 100;
            }

            const currentOneRepMax = getEstimatedOneRepMax(weight, currentReps);
            const currentWeightAtPreviousReps = getEquivalentWeightForReps(currentOneRepMax, previousReps);

            return ((currentWeightAtPreviousReps - weight) / weight) * 100;
        }

        function getAverage(values) {
            const validValues = values.filter((value) => Number.isFinite(value));
            if (validValues.length === 0) return null;
            return validValues.reduce((total, value) => total + value, 0) / validValues.length;
        }

        function formatPercent(value) {
            if (!Number.isFinite(value)) return "n/a";
            const sign = value > 0 ? "+" : "";
            return `${sign}${value.toFixed(1)}%`;
        }

        function getAllExerciseLabels() {
            const selectExercises = Array.from(document.querySelectorAll("#exercise option"))
                .map((option) => option.value)
                .filter(Boolean);
            const categoryExercises = Object.keys(exerciseCategories);
            return Array.from(new Set([...selectExercises, ...categoryExercises].map(getExerciseLabel)))
                .sort((a, b) => a.localeCompare(b));
        }

        function getDaysSince(timestamp) {
            if (!timestamp) return "none";
            const secondsElapsed = Math.max(0, Math.floor(Date.now() / 1000) - timestamp);
            const days = Math.floor(secondsElapsed / (24 * 60 * 60));
            return String(days);
        }

        function formatWeightList(weights) {
            if (weights.length === 0) return "none";
            return weights
                .sort((a, b) => a - b)
                .map((weight) => weight > 0 ? String(weight) : "bodyweight")
                .join(", ");
        }

        function renderNext(entries) {
            const exerciseHistory = entries.reduce((history, entry) => {
                const exercise = getExerciseLabel(entry.exercise);
                if (!history.has(exercise)) {
                    history.set(exercise, {
                        latestTimestamp: null,
                        weights: new Set()
                    });
                }

                const exerciseData = history.get(exercise);
                if (!exerciseData.latestTimestamp || entry.timestamp > exerciseData.latestTimestamp) {
                    exerciseData.latestTimestamp = entry.timestamp;
                }
                if (Number.isFinite(entry.weight)) {
                    exerciseData.weights.add(entry.weight);
                }
                return history;
            }, new Map());
            const rows = getAllExerciseLabels()
                .map((exercise) => {
                    const history = exerciseHistory.get(exercise);
                    return {
                        exercise,
                        timestamp: history?.latestTimestamp || null,
                        weights: history ? Array.from(history.weights) : []
                    };
                })
                .sort((a, b) => {
                    if (!a.timestamp && !b.timestamp) {
                        return a.exercise.localeCompare(b.exercise);
                    }
                    if (!a.timestamp) return -1;
                    if (!b.timestamp) return 1;
                    return a.timestamp - b.timestamp;
                });

            const bodyRows = rows.map((row) => `
                <tr>
                    <td>${row.exercise}</td>
                    <td>${getDaysSince(row.timestamp)}</td>
                    <td>${formatWeightList(row.weights)}</td>
                </tr>
            `).join("");

            nextTable.innerHTML = `
                <table class="next-table">
                    <thead>
                        <tr>
                            <th>Exercise</th>
                            <th>Days since last done</th>
                            <th>Weights</th>
                        </tr>
                    </thead>
                    <tbody>${bodyRows}</tbody>
                </table>
            `;
        }

        function renderAnalysis(entries) {
            const periods = [
                { key: "twoWeeks", label: "2 weeks", days: 14 },
                { key: "fourWeeks", label: "4 weeks", days: 28 },
                { key: "twoMonths", label: "2 months", days: 61 }
            ];
            const groupedEntries = entries.reduce((groups, entry) => {
                const exercise = getExerciseLabel(entry.exercise);
                const weightKey = String(entry.weight);

                if (!groups.has(exercise)) {
                    groups.set(exercise, new Map());
                }
                if (!groups.get(exercise).has(weightKey)) {
                    groups.get(exercise).set(weightKey, []);
                }
                groups.get(exercise).get(weightKey).push(entry);
                return groups;
            }, new Map());

            if (groupedEntries.size === 0) {
                analysisTable.innerHTML = "<p>No entries found.</p>";
                return;
            }

            const rows = Array.from(groupedEntries.entries())
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([exercise, weightGroups]) => {
                    const trends = {};
                    periods.forEach((period) => {
                        const weightTrends = Array.from(weightGroups.values())
                            .map((points) => getTrendPercent(points, period.days));
                        trends[period.key] = getAverage(weightTrends);
                    });
                    return { exercise, trends };
                });

            const totals = {};
            periods.forEach((period) => {
                totals[period.key] = getAverage(rows.map((row) => row.trends[period.key]));
            });

            const headerCells = periods.map((period) => `<th>${period.label}</th>`).join("");
            const bodyRows = rows.map((row) => `
                <tr>
                    <td>${row.exercise}</td>
                    ${periods.map((period) => `<td>${formatPercent(row.trends[period.key])}</td>`).join("")}
                </tr>
            `).join("");
            const footerCells = periods.map((period) => `<td>${formatPercent(totals[period.key])}</td>`).join("");

            analysisTable.innerHTML = `
                <table class="analysis-table">
                    <thead>
                        <tr>
                            <th>Exercise</th>
                            ${headerCells}
                        </tr>
                    </thead>
                    <tbody>${bodyRows}</tbody>
                    <tfoot>
                        <tr>
                            <td>Average</td>
                            ${footerCells}
                        </tr>
                    </tfoot>
                </table>
            `;
        }

        function setActiveView(view) {
            activeView = view;
            chartsView.hidden = view !== "charts";
            analysisView.hidden = view !== "analysis";
            nextView.hidden = view !== "next";
            viewTabs.querySelectorAll(".view-tab").forEach((button) => {
                button.classList.toggle("active", button.dataset.view === view);
            });

            if (view === "charts") {
                renderCharts(latestEntries);
            } else {
                chartsByKey.forEach((chart) => chart.destroy());
                chartsByKey.clear();
                if (view === "analysis") {
                    renderAnalysis(latestEntries);
                } else {
                    renderNext(latestEntries);
                }
            }
        }

        function renderCharts(entries) {
            const groupedEntries = entries
                .filter((entry) => exerciseCategories[entry.exercise] === activeChartCategory)
                .reduce((groups, entry) => {
                    const exercise = getExerciseLabel(entry.exercise);
                    if (!groups.has(exercise)) {
                        groups.set(exercise, {
                            exercise,
                            weights: new Map()
                        });
                    }

                    const weightKey = String(entry.weight);
                    const group = groups.get(exercise);
                    if (!group.weights.has(weightKey)) {
                        group.weights.set(weightKey, []);
                    }
                    group.weights.get(weightKey).push(entry);
                    return groups;
                }, new Map());

            chartsByKey.forEach((chart) => chart.destroy());
            chartsByKey.clear();
            chartGrid.innerHTML = "";

            if (groupedEntries.size === 0) {
                chartGrid.innerHTML = `<p>No ${activeChartCategory.toLowerCase()} exercise entries found.</p>`;
                return;
            }

            Array.from(groupedEntries.entries())
                .sort(([, a], [, b]) => a.exercise.localeCompare(b.exercise))
                .forEach(([key, group]) => {
                    const { start, end } = getChartRange();
                    const weightEntries = Array.from(group.weights.entries())
                        .sort(([a], [b]) => Number(a) - Number(b));

                    const panel = document.createElement("div");
                    panel.className = "chart-panel";

                    const title = document.createElement("h3");
                    title.textContent = group.exercise;

                    const canvasWrap = document.createElement("div");
                    canvasWrap.className = "chart-canvas-wrap";

                    const canvas = document.createElement("canvas");
                    canvasWrap.appendChild(canvas);

                    panel.appendChild(title);
                    panel.appendChild(canvasWrap);
                    chartGrid.appendChild(panel);

                    const chart = new Chart(canvas, {
                        type: "line",
                        data: {
                            datasets: weightEntries.map(([weight, points], index) => {
                                const color = getLineColor(index);

                                return {
                                    label: `${weight} lbs`,
                                    data: points
                                        .slice()
                                        .sort((a, b) => a.timestamp - b.timestamp)
                                        .map((point) => ({
                                            x: point.timestamp,
                                            y: point.reps
                                        })),
                                    borderColor: color,
                                    backgroundColor: color,
                                    tension: 0.2,
                                    spanGaps: true
                                };
                            })
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: true
                                },
                                tooltip: {
                                    callbacks: {
                                        title: (items) => getDateLabel(items[0].parsed.x)
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    type: "linear",
                                    min: start,
                                    max: end,
                                    ticks: {
                                        callback: (value) => getDateLabel(value),
                                        maxTicksLimit: 8
                                    },
                                    title: {
                                        display: true,
                                        text: "Date"
                                    }
                                },
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        precision: 0
                                    },
                                    title: {
                                        display: true,
                                        text: "Reps"
                                    }
                                }
                            }
                        }
                    });

                    chartsByKey.set(key, chart);
                });
        }

        chartRange.addEventListener("change", () => {
            renderCharts(latestEntries);
        });

        chartTabs.addEventListener("click", (event) => {
            const tab = event.target.closest(".chart-tab");
            if (!tab) return;

            activeChartCategory = tab.dataset.category;
            chartTabs.querySelectorAll(".chart-tab").forEach((button) => {
                button.classList.toggle("active", button === tab);
            });
            renderCharts(latestEntries);
        });

        viewTabs.addEventListener("click", (event) => {
            const tab = event.target.closest(".view-tab");
            if (!tab) return;

            setActiveView(tab.dataset.view);
        });

        function renderHistory(entries) {
            historyLog.innerHTML = "";

            if (entries.length === 0) {
                historyLog.innerHTML = "<p>No entries found.</p>";
                return;
            }

            entries.forEach((entry) => {
                const div = document.createElement("div");
                div.className = "log-item";
                div.innerHTML = `<strong>Exercise:</strong> ${entry.exercise} | <strong>Weight:</strong> ${entry.weight} | <strong>Reps:</strong> ${entry.reps} | <strong>Epoch:</strong> ${entry.timestamp}`;
                historyLog.appendChild(div);
            });
        }

        historyDetails.addEventListener("toggle", () => {
            if (historyDetails.open) {
                renderHistory(latestEntries);
            } else {
                historyLog.innerHTML = "";
            }
        });

        // Submit data to Firestore
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const exercise = document.getElementById("exercise").value;
            const enteredWeight = parseFloat(document.getElementById("weight").value);
            const weight = bodyweightExercises.has(exercise) ? 0 : enteredWeight;
            const reps = parseInt(document.getElementById("reps").value, 10);
            const epochTimestamp = Math.floor(Date.now() / 1000); // Unix epoch timestamp in seconds

            try {
                await addDoc(workoutCollection, {
                    exercise: exercise,
                    weight: weight,
                    reps: reps,
                    timestamp: epochTimestamp
                });
                form.reset();
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Failed to save entry. Check database rules.");
            }
        });

        // Real-time listener to fetch and display data
        const q = query(workoutCollection, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const entries = [];
            if (snapshot.empty) {
                latestEntries = entries;
                setActiveView(activeView);
                if (historyDetails.open) {
                    renderHistory(entries);
                }
                return;
            }
            snapshot.forEach((doc) => {
                const data = doc.data();
                entries.push({
                    exercise: getExerciseLabel(data.exercise || "Not set"),
                    weight: Number(data.weight),
                    reps: Number(data.reps),
                    timestamp: Number(data.timestamp)
                });
            });

            latestEntries = entries;
            setActiveView(activeView);
            if (historyDetails.open) {
                renderHistory(entries);
            }
        });
    </script>
</body>
</html>
